appId: com.moneyhoney.app
productName: MoneyHoney
directories:
  output: dist-electron
files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: MoneyHoney
